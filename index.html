<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>員工管理系統</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#6dd5fa,#2980b9);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
max-width:1100px;
background:white;
border-radius:15px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.topbar{
position:fixed;
top:20px;
right:30px;
z-index:2000;
}

.center{text-align:center;}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
margin:5px;
}

.btn-blue{background:#3498db;}
.btn-green{background:#2ecc71;}
.btn-orange{background:#f39c12;}
.btn-red{background:#e74c3c;}

input,select,textarea{
width:100%;
padding:8px;
margin:5px 0 12px;
border-radius:6px;
border:1px solid #ccc;
}

.hidden{display:none;}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#3498db;
color:white;
}

/* modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
z-index:5000;
}

.modal.active{
display:flex;
}

.modal-content{
background:white;
padding:25px;
border-radius:10px;
width:420px;
}

</style>
</head>

<body>

<div class="topbar">
<button class="btn-red" onclick="logout()">登出</button>
</div>

<div class="container">

<h1 class="center">員工管理系統</h1>

<div id="loginPage" class="center">
<input id="loginId" placeholder="輸入員工編號">
<button class="btn-blue" onclick="login()">登入</button>
</div>

<div id="homePage" class="hidden center">

<h3 id="welcomeText"></h3>

<button class="btn-green" onclick="clockIn()">上班打卡</button>
<button class="btn-orange" onclick="clockOut()">下班打卡</button>

<br>

<button class="btn-blue" onclick="openLeave()">請假申請</button>
<button id="btnApproveLeave" class="btn-red hidden" onclick="openApproval()">假單審核</button>

<br>

<button class="btn-orange" onclick="openManage()">員工管理</button>

</div>

<div id="leavePage" class="hidden">

<h3 class="center">請假申請</h3>

<select id="leaveType">
<option>休假</option>
<option>病假</option>
<option>出差</option>
<option>加班補休</option>
<option>喪假</option>
</select>

<input type="datetime-local" id="start">
<input type="datetime-local" id="end">

<textarea id="reason" placeholder="請假原因"></textarea>

<div class="center">
<button class="btn-green" onclick="submitLeave()">送出</button>
<button class="btn-blue" onclick="backHome()">返回</button>
</div>

</div>

<div id="approvalPage" class="hidden">
<h3 class="center">假單審核</h3>

<table>
<thead>
<tr>
<th>申請人</th>
<th>部門</th>
<th>假別</th>
<th>時間</th>
<th>原因</th>
<th>操作</th>
</tr>
</thead>
<tbody id="approvalTable"></tbody>
</table>

<div class="center" style="margin-top:20px;">
<button class="btn-blue" onclick="backHome()">返回</button>
</div>
</div>

<div id="managePage" class="hidden">

<h3>新增員工</h3>

<input id="empId" placeholder="員工編號">
<input id="empName" placeholder="姓名">
<input id="empSalary" placeholder="薪資">

<select id="empRole">
<option>職員</option>
<option>主管</option>
<option>副總</option>
<option>總經理</option>
<option>副董事長</option>
<option>董事長</option>
</select>

<select id="empDept">
<option>管理部門</option>
<option>資訊部門</option>
<option>金融部門</option>
<option>人事部門</option>
</select>

<button class="btn-green" onclick="addEmployee()">新增</button>

<table>
<thead>
<tr>
<th>編號</th>
<th>姓名</th>
<th>薪資</th>
<th>職位</th>
<th>部門</th>
<th>績效</th>
<th>獎金</th>
<th>操作</th>
</tr>
</thead>

<tbody id="empTable"></tbody>

</table>

<button class="btn-blue" onclick="backHome()">返回</button>

</div>

</div>

<div id="editModal" class="modal">

<div class="modal-content">

<h3>編輯員工</h3>

<input id="editName" placeholder="姓名">
<input id="editSalary" placeholder="薪資">

<select id="editRole">
<option>職員</option>
<option>主管</option>
<option>副總</option>
<option>總經理</option>
<option>副董事長</option>
<option>董事長</option>
</select>

<select id="editDept">
<option>管理部門</option>
<option>資訊部門</option>
<option>金融部門</option>
<option>人事部門</option>
</select>

<input id="editBonus" placeholder="獎金">
<input id="editPerf" placeholder="績效">

<div class="center">
<button class="btn-green" onclick="saveEdit()">儲存</button>
<button class="btn-red" onclick="closeModal()">取消</button>
</div>

</div>

</div>

<script>

let currentUser=null;
let editId=null;

const roleHierarchy = ["職員", "主管", "副總", "總經理", "副董事長", "董事長"];

function load(k){return JSON.parse(localStorage.getItem(k)||"{}")}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}

function init(){

let employees=load("employees");

if(!employees["admin_lun"]){

employees["admin_lun"]={
id:"admin_lun",
name:"系統管理員",
salary:0,
role:"管理員",
dept:"管理部門",
bonus:0,
performance:0
};

save("employees",employees);

}

}

init();

function login(){

let id=document.getElementById("loginId").value.trim();
let employees=load("employees");

if(!employees[id]){alert("員工不存在");return;}

currentUser=employees[id];

document.getElementById("loginPage").classList.add("hidden");
document.getElementById("homePage").classList.remove("hidden");

// 判斷是否顯示假單審核按鈕 (僅職員沒有)
if(currentUser.role !== "職員"){
    document.getElementById("btnApproveLeave").classList.remove("hidden");
} else {
    document.getElementById("btnApproveLeave").classList.add("hidden");
}

document.getElementById("welcomeText").innerText=
"歡迎 "+currentUser.name+" ("+currentUser.role+")";

}

function logout(){location.reload()}

function hideAll(){
["loginPage","homePage","leavePage","managePage","approvalPage"].forEach(p=>{
document.getElementById(p).classList.add("hidden")
})
}

function backHome(){
hideAll();
document.getElementById("homePage").classList.remove("hidden");
}

function clockIn(){alert("上班打卡成功")}
function clockOut(){alert("下班打卡成功")}

function openLeave(){
hideAll();
document.getElementById("leavePage").classList.remove("hidden");
}

function submitLeave(){

let leaves=load("leaves");
let id=Date.now().toString();

let roleIdx = roleHierarchy.indexOf(currentUser.role);
let status = "審核中";
let nextRole = "";

// 判斷下一位審核者
if(roleIdx === -1 || roleIdx >= roleHierarchy.length - 1){
    // 董事長或非階層內的角色(如管理員)直接核准
    status = "已通過";
} else {
    nextRole = roleHierarchy[roleIdx + 1];
}

leaves[id]={
    id: id,
    empId: currentUser.id,
    empName: currentUser.name,
    dept: currentUser.dept,
    type: document.getElementById("leaveType").value,
    time: document.getElementById("start").value + " ~ " + document.getElementById("end").value,
    reason: document.getElementById("reason").value,
    status: status,
    nextRole: nextRole
};

save("leaves",leaves);

alert("請假申請已送出！");
backHome();

}

// 新增：開啟假單審核頁面
function openApproval(){
    hideAll();
    document.getElementById("approvalPage").classList.remove("hidden");
    renderApprovals();
}

// 新增：渲染待審核列表
function renderApprovals(){
    let leaves = load("leaves");
    let tbody = document.getElementById("approvalTable");
    tbody.innerHTML = "";

    Object.values(leaves).forEach(L => {
        // 只顯示狀態為審核中，且下一位審核者為當前登入者職位的假單
        if(L.status === "審核中" && L.nextRole === currentUser.role){
            
            // 主管僅能審核同部門的假單，副總以上可跨部門
            if(currentUser.role === "主管" && L.dept !== currentUser.dept){
                return;
            }

            tbody.innerHTML += `
            <tr>
                <td>${L.empName}</td>
                <td>${L.dept}</td>
                <td>${L.type}</td>
                <td>${L.time}</td>
                <td>${L.reason}</td>
                <td>
                    <button class="btn-green" onclick="processLeave('${L.id}', 'approve')">批准</button>
                    <button class="btn-red" onclick="processLeave('${L.id}', 'reject')">駁回</button>
                </td>
            </tr>
            `;
        }
    });

    if(tbody.innerHTML === ""){
        tbody.innerHTML = `<tr><td colspan="6">目前沒有待審核的假單</td></tr>`;
    }
}

// 新增：處理審核動作 (批准/駁回)
function processLeave(leaveId, action){
    let leaves = load("leaves");
    let L = leaves[leaveId];

    if(action === 'reject'){
        L.status = "已駁回";
    } else {
        let currentIdx = roleHierarchy.indexOf(currentUser.role);
        
        // 如果已經是最高層級，狀態改為已通過；否則繼續往上送
        if(currentIdx >= roleHierarchy.length - 1){
            L.status = "已通過";
            L.nextRole = "";
        } else {
            L.nextRole = roleHierarchy[currentIdx + 1];
        }
    }

    save("leaves", leaves);
    renderApprovals();
}

function openManage(){

hideAll();
document.getElementById("managePage").classList.remove("hidden");

renderEmployees();

}

function addEmployee(){

let employees=load("employees");

let id=document.getElementById("empId").value;

employees[id]={
id,
name:document.getElementById("empName").value,
salary:document.getElementById("empSalary").value,
role:document.getElementById("empRole").value,
dept:document.getElementById("empDept").value,
bonus:0,
performance:0
};

save("employees",employees);

renderEmployees();

}

function renderEmployees(){

let employees=load("employees");
let empTable = document.getElementById("empTable");

empTable.innerHTML="";

Object.values(employees).forEach(e=>{

empTable.innerHTML+=`
<tr>
<td>${e.id}</td>
<td>${e.name}</td>
<td>${e.salary}</td>
<td>${e.role}</td>
<td>${e.dept}</td>
<td>${e.performance}</td>
<td>${e.bonus}</td>
<td>
<button class="btn-blue" onclick="editEmployee('${e.id}')">編輯</button>
<button class="btn-red" onclick="deleteEmployee('${e.id}')">刪除</button>
</td>
</tr>
`;

});

}

function editEmployee(id){

let employees=load("employees");
let e=employees[id];

editId=id;

document.getElementById("editName").value=e.name;
document.getElementById("editSalary").value=e.salary;
document.getElementById("editRole").value=e.role;
document.getElementById("editDept").value=e.dept;
document.getElementById("editBonus").value=e.bonus;
document.getElementById("editPerf").value=e.performance;

document.getElementById("editModal").classList.add("active");

}

function saveEdit(){

let employees=load("employees");

employees[editId].name=document.getElementById("editName").value;
employees[editId].salary=document.getElementById("editSalary").value;
employees[editId].role=document.getElementById("editRole").value;
employees[editId].dept=document.getElementById("editDept").value;
employees[editId].bonus=Number(document.getElementById("editBonus").value);
employees[editId].performance=Number(document.getElementById("editPerf").value);

save("employees",employees);

closeModal();
renderEmployees();

}

function deleteEmployee(id){

if(!confirm("確定刪除?"))return;

let employees=load("employees");

delete employees[id];

save("employees",employees);

renderEmployees();

}

function closeModal(){

document.getElementById("editModal").classList.remove("active");

}

</script>

</body>
</html>
