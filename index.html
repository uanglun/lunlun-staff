<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>員工管理系統</title>

<style>

body{
font-family:Arial;
margin:20px;
background:#f4f4f4;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:20px 30px;
border-radius:8px;
box-shadow:0 4px 6px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

.section{
margin-bottom:30px;
}

.form-group{
margin-bottom:15px;
}

.form-group input,.form-group select{
width:100%;
padding:8px;
}

.btn{
background:#5cb85c;
color:white;
padding:10px 15px;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:10px;
}

.btn-info{background:#5bc0de;}
.btn-secondary{background:#f0ad4e;}
.btn-danger{background:#d9534f;}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#f2f2f2;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.modal-content{
background:white;
margin:10% auto;
padding:20px;
width:400px;
border-radius:8px;
}

.close-btn{
float:right;
font-size:22px;
cursor:pointer;
}

.login-box{
text-align:center;
margin-top:80px;
}

</style>

</head>

<body>

<div class="container">

<h1>員工管理系統</h1>

<!-- 登入頁 -->
<div id="loginPage">

<div class="login-box">

<h2>員工登入</h2>

<input id="employeeIdInput" placeholder="輸入員工編號">

<br><br>

<button class="btn" onclick="login()">登入</button>

</div>

</div>

<!-- 歡迎頁 -->
<div id="welcomePage" style="display:none">

<h2>歡迎使用系統</h2>

<div id="welcomeButtons"></div>

</div>

<!-- 管理頁 -->
<div id="managerPage" style="display:none">

<h2>新增員工</h2>

<div class="form-group">
<input id="addId" placeholder="員工編號">
</div>

<div class="form-group">
<input id="addName" placeholder="姓名">
</div>

<div class="form-group">
<select id="addDepartment">
<option>資訊部門</option>
<option>系統部門</option>
<option>管理部門</option>
</select>
</div>

<div class="form-group">
<input id="addPosition" placeholder="職位">
</div>

<div class="form-group">
<input id="addSalary" type="number" placeholder="薪資">
</div>

<button class="btn" onclick="addEmployee()">新增員工</button>

<hr>

<h2>員工列表</h2>

<table id="employeeTable">

<thead>
<tr>
<th>編號</th>
<th>姓名</th>
<th>部門</th>
<th>職位</th>
<th>薪資</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<!-- 員工頁 -->
<div id="employeePage" style="display:none">

<h2>個人資料</h2>

<div id="personalDetails"></div>

</div>

</div>


<!-- 請假視窗 -->

<div id="leaveModal" class="modal">

<div class="modal-content">

<span class="close-btn" onclick="closeLeaveModal()">×</span>

<h2>請假申請</h2>

<label><input type="radio" name="leaveType" value="事假">事假</label>
<label><input type="radio" name="leaveType" value="病假">病假</label>
<label><input type="radio" name="leaveType" value="特休">特休</label>

<br><br>

<input type="date" id="leaveStart">

<br><br>

<input type="date" id="leaveEnd">

<br><br>

<input id="leaveReason" placeholder="請假原因">

<br><br>

<button class="btn" onclick="submitLeave()">送出請假</button>

</div>

</div>


<script>

const STORAGE_KEY="employee_manager_data";
const LEAVE_KEY="employee_leave_data";

let currentEmployeeId=null;

function loadData(){

const data=localStorage.getItem(STORAGE_KEY);

if(data) return JSON.parse(data);

return {employees:{}};

}

function saveData(data){

localStorage.setItem(STORAGE_KEY,JSON.stringify(data));

}

function login(){

const id=document.getElementById("employeeIdInput").value.trim().toUpperCase();

if(!id){alert("請輸入員工編號");return;}

const data=loadData();

const emp=data.employees[id];

if(id==="ADMIN_LUN"|| (emp && emp.position==="管理員")){

currentEmployeeId=id;

showPage("welcomePage");

document.getElementById("welcomeButtons").innerHTML=`
<button class="btn" onclick="enterManagerPage()">進入管理系統</button>
`;

return;
}

if(!emp){alert("員工不存在");return;}

currentEmployeeId=id;

showPage("welcomePage");

document.getElementById("welcomeButtons").innerHTML=`
<button class="btn" onclick="enterEmployeePage()">查看個人資料</button>
<button class="btn btn-info" onclick="clockIn()">上班打卡</button>
<button class="btn btn-info" onclick="clockOut()">下班打卡</button>
<button class="btn btn-secondary" onclick="openLeaveModal()">請假申請</button>
`;

}

function showPage(id){

document.getElementById("loginPage").style.display="none";
document.getElementById("welcomePage").style.display="none";
document.getElementById("managerPage").style.display="none";
document.getElementById("employeePage").style.display="none";

document.getElementById(id).style.display="block";

}

function enterManagerPage(){

showPage("managerPage");

renderEmployeeTable();

}

function enterEmployeePage(){

showPage("employeePage");

renderEmployeeDetails();

}

function addEmployee(){

const id=document.getElementById("addId").value.toUpperCase();

const name=document.getElementById("addName").value;

const dep=document.getElementById("addDepartment").value;

const pos=document.getElementById("addPosition").value;

const salary=parseFloat(document.getElementById("addSalary").value);

if(!id||!name||!pos||!salary){alert("資料不完整");return;}

const data=loadData();

data.employees[id]={

name,
department:dep,
position:pos,
salary,
attendance:[]

};

saveData(data);

alert("新增成功");

renderEmployeeTable();

}

function renderEmployeeTable(){

const body=document.querySelector("#employeeTable tbody");

body.innerHTML="";

const data=loadData();

for(let id in data.employees){

const emp=data.employees[id];

body.innerHTML+=`
<tr>
<td>${id}</td>
<td>${emp.name}</td>
<td>${emp.department}</td>
<td>${emp.position}</td>
<td>${emp.salary}</td>
</tr>
`;

}

}

function renderEmployeeDetails(){

const data=loadData();

const emp=data.employees[currentEmployeeId];

document.getElementById("personalDetails").innerHTML=`

<p>姓名：${emp.name}</p>
<p>部門：${emp.department}</p>
<p>職位：${emp.position}</p>
<p>薪資：${emp.salary}</p>

`;

}

function clockIn(){

const data=loadData();

const emp=data.employees[currentEmployeeId];

emp.attendance.push({start:new Date().toLocaleString()});

saveData(data);

alert("上班打卡成功");

}

function clockOut(){

const data=loadData();

const emp=data.employees[currentEmployeeId];

if(emp.attendance.length===0){alert("尚未打卡");return;}

emp.attendance[emp.attendance.length-1].end=new Date().toLocaleString();

saveData(data);

alert("下班打卡成功");

}


/* ===== 請假系統 ===== */

function openLeaveModal(){

document.getElementById("leaveModal").style.display="block";

}

function closeLeaveModal(){

document.getElementById("leaveModal").style.display="none";

}

function submitLeave(){

const type=document.querySelector('input[name="leaveType"]:checked');

const start=document.getElementById("leaveStart").value;

const end=document.getElementById("leaveEnd").value;

const reason=document.getElementById("leaveReason").value;

if(!type||!start||!end){

alert("請填寫完整請假資料");

return;

}

let leaves=JSON.parse(localStorage.getItem(LEAVE_KEY)||"[]");

leaves.push({

employeeId:currentEmployeeId,

type:type.value,

start,

end,

reason

});

localStorage.setItem(LEAVE_KEY,JSON.stringify(leaves));

alert("請假申請成功");

closeLeaveModal();

}

</script>

</body>
</html>
