<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>員工管理系統</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:"Segoe UI",sans-serif;
margin:0;
background:linear-gradient(135deg,#6dd5fa,#2980b9);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:100%;
max-width:1100px;
background:white;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
padding:30px 40px;
position:relative;
}

.center{
text-align:center;
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0 12px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
color:white;
margin:5px;
}

.btn-blue{background:#3498db;}
.btn-green{background:#2ecc71;}
.btn-orange{background:#f39c12;}
.btn-red{background:#e74c3c;}
.btn-purple{background:#8e44ad;}

button:hover{opacity:.9;}

.topbar{
position:absolute;
top:15px;
right:20px;
}

.hidden{display:none;}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#3498db;
color:white;
}

.section{
margin-top:25px;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<button class="btn-red hidden" id="logoutBtn" onclick="logout()">登出</button>
</div>

<h1 class="center">員工管理系統</h1>

<!-- 登入 -->
<div id="loginPage" class="center">
<h3>員工登入</h3>
<input id="loginId" placeholder="輸入員工編號">
<button class="btn-blue" onclick="login()">登入</button>
</div>

<!-- 首頁 -->
<div id="homePage" class="hidden center">

<h3 id="welcomeText"></h3>

<button class="btn-green" onclick="clockIn()">上班打卡</button>
<button class="btn-orange" onclick="clockOut()">下班打卡</button>

<br>

<button class="btn-blue" onclick="openLeaveForm()">請假申請</button>
<button class="btn-purple" onclick="showLeaves()">查看請假</button>

<br>

<button id="manageBtn" class="btn-orange hidden" onclick="openManage()">員工管理</button>
<button id="reviewBtn" class="btn-green hidden" onclick="openReview()">審核假單</button>

</div>

<!-- 請假 -->
<div id="leavePage" class="hidden">

<h3 class="center">請假申請</h3>

<label>請假類型</label>
<label><input type="radio" name="leaveType" value="休假">休假</label>
<label><input type="radio" name="leaveType" value="加班補休">加班補休</label>
<label><input type="radio" name="leaveType" value="出差">出差</label>
<label><input type="radio" name="leaveType" value="病假">病假</label>
<label><input type="radio" name="leaveType" value="家庭照顧假">家庭照顧假</label>
<label><input type="radio" name="leaveType" value="身心調適假">身心調適假</label>
<label><input type="radio" name="leaveType" value="喪假">喪假</label>

<label>開始時間</label>
<input type="datetime-local" id="start">

<label>結束時間</label>
<input type="datetime-local" id="end">

<label>請假事由</label>
<textarea id="reason"></textarea>

<label>請假備註</label>
<textarea id="note"></textarea>

<div class="center">
<button class="btn-green" onclick="submitLeave()">送出</button>
<button class="btn-blue" onclick="backHome()">返回</button>
</div>

</div>

<!-- 假單列表 -->
<div id="leaveListPage" class="hidden">

<h3 class="center">請假紀錄</h3>

<table>
<thead>
<tr>
<th>員工編號</th>
<th>姓名</th>
<th>類型</th>
<th>時間</th>
<th>狀態</th>
</tr>
</thead>
<tbody id="leaveTable"></tbody>
</table>

<div class="center">
<button class="btn-blue" onclick="backHome()">返回</button>
</div>

</div>

<!-- 員工管理 -->
<div id="managePage" class="hidden">

<h3 class="center">新增員工</h3>

<input id="empId" placeholder="員工編號">
<input id="empName" placeholder="員工姓名">
<input id="empSalary" placeholder="員工薪資">

<select id="empRole">
<option>職員</option>
<option>主管</option>
<option>副總</option>
<option>總經理</option>
<option>副董事長</option>
<option>董事長</option>
</select>

<select id="empDept">
<option>管理部門</option>
<option>資訊部門</option>
<option>金融部門</option>
<option>人事部門</option>
</select>

<div class="center">
<button class="btn-green" onclick="addEmployee()">新增員工</button>
</div>

<table>
<thead>
<tr>
<th>編號</th>
<th>姓名</th>
<th>薪資</th>
<th>職位</th>
<th>部門</th>
</tr>
</thead>
<tbody id="empTable"></tbody>
</table>

<div class="center">
<button class="btn-blue" onclick="backHome()">返回</button>
</div>

</div>

<!-- 審核 -->
<div id="reviewPage" class="hidden">

<h3 class="center">假單審核</h3>

<table>
<thead>
<tr>
<th>員工</th>
<th>類型</th>
<th>時間</th>
<th>狀態</th>
<th>操作</th>
</tr>
</thead>
<tbody id="reviewTable"></tbody>
</table>

<div class="center">
<button class="btn-blue" onclick="backHome()">返回</button>
</div>

</div>

</div>

<script>

let currentUser=null;

const roleRank={
"職員":1,
"主管":2,
"副總":3,
"總經理":4,
"副董事長":5,
"董事長":6,
"管理員":7
};

function load(key){
return JSON.parse(localStorage.getItem(key)||"{}");
}

function save(key,data){
localStorage.setItem(key,JSON.stringify(data));
}

function init(){

let employees=load("employees");

if(!employees["admin_lun"]){

employees["admin_lun"]={
id:"admin_lun",
name:"系統管理員",
salary:0,
role:"管理員",
dept:"管理部門"
};

save("employees",employees);

}

}

init();

function login(){

const id=document.getElementById("loginId").value.trim();

const employees=load("employees");

if(!employees[id]){
alert("員工不存在");
return;
}

currentUser=employees[id];

document.getElementById("loginPage").classList.add("hidden");
document.getElementById("homePage").classList.remove("hidden");

document.getElementById("logoutBtn").classList.remove("hidden");

document.getElementById("welcomeText").innerText=
`歡迎 ${currentUser.name} (${currentUser.role})`;

if(roleRank[currentUser.role]>=2)
document.getElementById("reviewBtn").classList.remove("hidden");

if(currentUser.role==="管理員")
document.getElementById("manageBtn").classList.remove("hidden");

}

function logout(){location.reload();}

function backHome(){

document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
document.getElementById("homePage").classList.remove("hidden");

}

function clockIn(){alert("上班打卡成功 "+new Date().toLocaleString());}
function clockOut(){alert("下班打卡成功 "+new Date().toLocaleString());}

function openLeaveForm(){

document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
document.getElementById("leavePage").classList.remove("hidden");

}

function submitLeave(){

const type=document.querySelector("input[name=leaveType]:checked");

if(!type){alert("請選擇請假類型");return;}

const start=document.getElementById("start").value;
const end=document.getElementById("end").value;

if(!start||!end){alert("請填時間");return;}

let leaves=load("leaves");

const id=Date.now();

leaves[id]={
id,
empId:currentUser.id,
name:currentUser.name,
dept:currentUser.dept,
type:type.value,
time:start+"~"+end,
stage:"主管",
status:"審核中"
};

save("leaves",leaves);

alert("請假申請成功");

backHome();

}

function showLeaves(){

document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
document.getElementById("leaveListPage").classList.remove("hidden");

const leaves=load("leaves");
const table=document.getElementById("leaveTable");

table.innerHTML="";

Object.values(leaves).forEach(l=>{

table.innerHTML+=`
<tr>
<td>${l.empId}</td>
<td>${l.name}</td>
<td>${l.type}</td>
<td>${l.time}</td>
<td>${l.stage}審核</td>
</tr>
`;

});

}

function openManage(){

document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
document.getElementById("managePage").classList.remove("hidden");

renderEmployees();

}

function addEmployee(){

const id=document.getElementById("empId").value;
const name=document.getElementById("empName").value;
const salary=document.getElementById("empSalary").value;
const role=document.getElementById("empRole").value;
const dept=document.getElementById("empDept").value;

if(!id||!name){alert("資料不完整");return;}

let employees=load("employees");

employees[id]={id,name,salary,role,dept};

save("employees",employees);

renderEmployees();

}

function renderEmployees(){

const employees=load("employees");
const table=document.getElementById("empTable");

table.innerHTML="";

Object.values(employees).forEach(e=>{

table.innerHTML+=`
<tr>
<td>${e.id}</td>
<td>${e.name}</td>
<td>${e.salary}</td>
<td>${e.role}</td>
<td>${e.dept}</td>
</tr>
`;

});

}

function openReview(){

document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
document.getElementById("reviewPage").classList.remove("hidden");

renderReview();

}

function renderReview(){

const leaves=load("leaves");
const table=document.getElementById("reviewTable");

table.innerHTML="";

Object.values(leaves).forEach(l=>{

if(l.status!=="審核中") return;

if(l.stage!==currentUser.role && currentUser.role!=="管理員") return;

table.innerHTML+=`
<tr>
<td>${l.name}</td>
<td>${l.type}</td>
<td>${l.time}</td>
<td>${l.stage}</td>
<td>
<button class="btn-green" onclick="approve(${l.id})">批准</button>
<button class="btn-red" onclick="reject(${l.id})">駁回</button>
</td>
</tr>
`;

});

}

function approve(id){

let leaves=load("leaves");

const order=["主管","副總","總經理","副董事長","董事長"];

let idx=order.indexOf(leaves[id].stage);

if(idx===order.length-1){
leaves[id].status="完成";
}else{
leaves[id].stage=order[idx+1];
}

save("leaves",leaves);

renderReview();

}

function reject(id){

let leaves=load("leaves");

leaves[id].status="已駁回";

save("leaves",leaves);

renderReview();

}

</script>

</body>
</html>
